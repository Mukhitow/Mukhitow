    <text x="18" y="32" fill="#D8D2C3" fill-opacity="0.55" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">SYSTEM SIGNAL</text>
    <path d="M20 74H68L91 42L125 122L154 76H218L240 52" stroke="#C0903D" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"/>
    <path d="M20 126H260" stroke="#D8D2C3" stroke-opacity="0.1"/>
    <path d="M20 104H260" stroke="#D8D2C3" stroke-opacity="0.1"/>
    <path d="M20 82H260" stroke="#D8D2C3" stroke-opacity="0.1"/>
    <circle cx="240" cy="52" r="4" fill="#C0903D">
