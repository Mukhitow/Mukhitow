<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070808"/>
      <stop offset="0.48" stop-color="#111312"/>
      <stop offset="1" stop-color="#090A0A"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8E6A2F" stop-opacity="0"/>
      <stop offset="0.52" stop-color="#C0903D" stop-opacity="1"/>
      <stop offset="1" stop-color="#8E6A2F" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(940 135) rotate(143) scale(270 130)">
      <stop stop-color="#C0903D" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#C0903D" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" stroke="#D8D2C3" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="soft">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#grid)"/>
  <rect width="1200" height="420" fill="url(#glow)"/>

  <path d="M0 72H1200" stroke="#D8D2C3" stroke-opacity="0.12"/>
  <path d="M0 348H1200" stroke="#D8D2C3" stroke-opacity="0.12"/>
  <path d="M72 0V420" stroke="#D8D2C3" stroke-opacity="0.10"/>
  <path d="M1128 0V420" stroke="#D8D2C3" stroke-opacity="0.10"/>

  <rect x="70" y="70" width="1060" height="280" rx="0" stroke="#D8D2C3" stroke-opacity="0.22"/>
  <rect x="91" y="92" width="1018" height="236" rx="0" stroke="#C0903D" stroke-opacity="0.23"/>

  <text x="98" y="126" fill="#8A857B" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace" font-size="13" letter-spacing="2">/PROFILE/ENTERPRISE-SYSTEMS/CONTROL-NODE</text>
  <text x="96" y="207" fill="#F2EEE3" font-family="Inter, Arial, Helvetica, sans-serif" font-size="82" font-weight="800" letter-spacing="8">MUKHITOW</text>
